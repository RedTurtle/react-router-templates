name: Release

on:
  push:
    tags: ["*"]

jobs:
  # ---------------------------------------------------------------------------
  # Build (parallel)
  # ---------------------------------------------------------------------------
  build-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm install --frozen-lockfile --prod
      - uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: |
            build/
            node_modules/
            package.json
            pnpm-lock.yaml
          retention-days: 1

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

  # ---------------------------------------------------------------------------
  # Publish (after respective build jobs)
  # ---------------------------------------------------------------------------
  publish-tarball:
    runs-on: ubuntu-latest
    needs: [build-app]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app-build
      - name: Create tarball
        run: tar -czf "${{ github.event.repository.name }}-${{ github.ref_name }}.tar.gz" build/ node_modules/ package.json pnpm-lock.yaml
      - name: Create GitHub Release and upload tarball
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            "${{ github.event.repository.name }}-${{ github.ref_name }}.tar.gz"
